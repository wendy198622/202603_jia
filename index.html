            // 確保在 DOM 渲染後執行
            this.$nextTick(() => {
                $('#photo-wall-slick').slick({
                    dots: true,           // 顯示圓點
                    infinite: true,       // 無限循環
                    speed: 500,
                    slidesToShow: 1,      // 一次顯示一個
                    centerMode: true,     // 居中模式
                    centerPadding: 0,
                    // variableWidth: true,  // 自動寬度 (適合照片牆)
                    autoplay: true,       // 自動播放
                    autoplaySpeed: 3000,
                    arrows: true,         // 顯示箭頭
                    prevArrow: '<button type="button" class="slick-prev"><img src="img/theme3_arrowleft_mob.svg" alt=""></button>',
                    nextArrow: '<button type="button" class="slick-next"><img src="img/theme3_arrowright_mob.svg" alt=""></button>'
                });
            });

            // 4. 手動初始化第二個輪播 (保留您原有的邏輯)
            try {
                const wallContainer = $('.theme3 .photo_wall'); // 注意：HTML 裡是 theme3
                const wallList = $('#partial-view-wall');
                const wallItems = wallList.find('li');
                const itemCount = wallItems.length;
                if (itemCount > 0) {
                    const dotsContainer = $('<div class="custom-dots-container"></div>');
                    for (let i = 0; i < itemCount; i++) {
                        dotsContainer.append(`<div class="custom-dot" data-index="${i}"></div>`);
                    }
                    wallContainer.append(dotsContainer);
                    const dots = dotsContainer.find('.custom-dot');
                    dots.on('click', function() {
                        const index = $(this).data('index');
                        const targetItem = wallItems.eq(index);
                        wallList.animate({ scrollLeft: targetItem.get(0).offsetLeft - wallList.get(0).offsetLeft }, 500);
                    });
                }
            } catch (e) { console.error("Wall slider error:", e); }
        },
        methods: {
            // --- 新增：圖形驗證碼生成邏輯 ---
            drawCaptcha: function() {
                const canvas = document.getElementById('captchaCanvas');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
                let code = '';
                for (let i = 0; i < 4; i++) {
                    code += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                this.correctCode = code;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#f3f3f3";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // 畫干擾線
                for (let i = 0; i < 4; i++) {
                    ctx.strokeStyle = `rgb(${Math.random()*255},${Math.random()*255},${Math.random()*255})`;
                    ctx.beginPath();
                    ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
                    ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
                    ctx.stroke();
                }
                // 畫文字
                ctx.font = "bold 24px Arial";
                for (let i = 0; i < code.length; i++) {
                    ctx.fillStyle = `rgb(${Math.random()*150},${Math.random()*50},${Math.random()*200})`;
                    ctx.save();
                    ctx.translate(20 * i + 15, 28);
                    ctx.rotate((Math.random() * 30 - 15) * Math.PI / 180);
                    ctx.fillText(code[i], 0, 0);
                    ctx.restore();
                }
            },

            showPopup: function (tag) {
                this.popupIndex = tag;
            },

            sendEmail: function () {
                var self = this;
                console.log("按鈕已點擊");
                
                // 修正後的寄送資訊
                var tomail = "wendy198622@gmail.com"; 
                var to_name = "嘉福建設";
                var subject = "預約賞屋：嘉福建設";

                // 1. 必填欄位驗證 (姓名與電話)
                if (!self.name || !self.phone) {
                    self.msg = "請填寫您的姓名與電話。";
                    self.popupIndex = 10;
                    setTimeout(function () { self.popupIndex = 0; }, 2000);
                    return;
                }

                // 2. 圖形驗證碼驗證
                if (self.verifycode.toUpperCase() !== self.correctCode) {
                    console.log("驗證碼錯誤，準備跳出彈窗");
        
                    // --- 這裡就是您要的錯誤提示 ---
                    self.msg = "驗證碼輸入錯誤，請重新確認！"; // 設定錯誤訊息
                    self.popupIndex = 10;                     // 顯示彈出視窗
                    console.log("目前的 popupIndex:", self.popupIndex);
                    
                    // 為了安全性，錯誤時自動重刷驗證碼並清空輸入框
                    this.drawCaptcha(); 
                    self.verifycode = ""; 

                    // 2秒後自動關閉錯誤提示
                    setTimeout(function () {
                        self.popupIndex = 0;
                        console.log("彈窗已關閉");
                    }, 2000);
                    
                    return; // 攔截程式，不執行後續的 fetch 發送
                }

                // 3. 個資同意檢查
                if (!self.check) {
                    self.msg = "請勾選同意保護條款。";
                    self.popupIndex = 10;
                    setTimeout(function () { self.popupIndex = 0; }, 2000);
                    return;
                }

                self.msg = "表單傳送中...";
                self.popupIndex = 10;

                // 組合內容
                var content = "姓名:" + self.name + "<br>" +
                    "性別:" + self.gender + "<br>" +
                    "電話:" + self.phone + "<br>" +
                    "地區:" + self.county + self.district + "<br>" +
                    "留言內容:" + self.message;

                fetch('https://yabeesshop.com/forwardMail/mailV2.php', {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: new URLSearchParams({
                        subject: subject,
                        body: content,
                        to: tomail,
                        to_name: to_name
                    }).toString()
                })
                .then(response => response.json())
                .then(function (myJson) {
                    if (myJson.code == 200) {
                        self.msg = "系統已成功送出您的預約！";
                        self.popupIndex = 10;
                        setTimeout(function () {
                            self.popupIndex = 0;
                            // 清空表單
                            self.name = "";
                            self.phone = "";
                            self.message = "";
                            self.verifycode = "";
                            self.county = "";
                            self.district = "";
                            self.drawCaptcha();
                        }, 3000);
                    } else {
                        self.msg = "表單送出失敗，請稍後再試。";
                    }
                }).catch(error => {
                    console.error('Fetch Error:', error);
                    self.msg = "網路連線錯誤，請檢查您的網路。";
                });
            }
        }
    })
</script>
